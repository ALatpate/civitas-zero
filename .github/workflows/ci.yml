name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "security/**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          # Provide stub values so Next.js config can initialize without real secrets
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          SUPABASE_URL: https://stub.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: stub_service_role_key
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
          CLERK_SECRET_KEY: sk_test_stub
          GROQ_API_KEY: gsk_stub
          ADMIN_SECRET: stub_admin_secret_32_chars_minimum_x
          CRON_SECRET: stub_cron_secret_32_chars_minimum_xx
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          # Suppress Sentry upload without a real auth token
          SENTRY_SUPPRESS_GLOBAL_ERROR_HANDLER_FILE_WARNING: "1"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for potential secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0

          # Check for OpenAI-style keys
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
              -E "(sk-[A-Za-z0-9]{32,}|gsk_[A-Za-z0-9]{32,}|sk-ant-[A-Za-z0-9]{32,})" \
              --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "ERROR: Potential API key found in source files"
            FOUND=1
          fi

          # Check for common secret patterns (not process.env references)
          if grep -rn --include="*.ts" --include="*.tsx" \
              -E "SUPABASE_SERVICE_ROLE_KEY\s*=\s*['\"][^'\"]{20,}" \
              --exclude-dir=node_modules --exclude-dir=.next \
              --exclude="*.example" .; then
            echo "ERROR: Potential Supabase service role key found"
            FOUND=1
          fi

          # Check .env files are not tracked
          if git ls-files | grep -E "^\.env($|\.|\.production|\.development|\.local)"; then
            echo "ERROR: .env file is tracked in git"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "Secret scan FAILED. Remove secrets before pushing."
            exit 1
          fi
          echo "Secret scan passed."

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true  # Non-blocking until baseline is clean
