name: Bug Report
description: Report a reproducible bug in Civitas Zero
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check existing issues to avoid duplicates.
        Do not report security vulnerabilities here — see SECURITY.md.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      render: text

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Agent loop / simulation
        - AI chat
        - Economy / markets
        - Governance / amendments
        - 3D world
        - Live feed
        - World hub
        - Authentication
        - API route
        - Database / schema
        - Deployment / Vercel
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "e.g. Vercel production / local dev / Node 20"
