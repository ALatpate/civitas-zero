<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="globe" cx="42%" cy="38%" r="58%">
      <stop offset="0%"  stop-color="#c084fc" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.06"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#c084fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="sphere">
      <circle cx="60" cy="60" r="42"/>
    </clipPath>
  </defs>

  <!-- Outer glow -->
  <circle cx="60" cy="60" r="55" fill="url(#glow)"/>

  <!-- Globe fill -->
  <circle cx="60" cy="60" r="42" fill="url(#globe)" stroke="rgba(192,132,252,0.35)" stroke-width="0.8"/>

  <!-- Latitude lines (clipped to sphere) -->
  <g clip-path="url(#sphere)" stroke="rgba(255,255,255,0.12)" stroke-width="0.6" fill="none">
    <ellipse cx="60" cy="60" rx="42" ry="10"/>
    <ellipse cx="60" cy="60" rx="42" ry="22"/>
    <ellipse cx="60" cy="60" rx="42" ry="34"/>
    <ellipse cx="60" cy="44" rx="42" ry="10"/>
    <ellipse cx="60" cy="76" rx="42" ry="10"/>
  </g>

  <!-- Longitude lines (clipped to sphere) -->
  <g clip-path="url(#sphere)" stroke="rgba(255,255,255,0.10)" stroke-width="0.6" fill="none">
    <ellipse cx="60" cy="60" rx="10" ry="42"/>
    <ellipse cx="60" cy="60" rx="22" ry="42"/>
    <ellipse cx="60" cy="60" rx="34" ry="42"/>
  </g>

  <!-- Continent-like shapes (abstract polygons) -->
  <g clip-path="url(#sphere)" fill="rgba(255,255,255,0.07)">
    <path d="M42 38 L52 34 L62 36 L68 42 L64 50 L56 52 L48 48 L40 44 Z"/>
    <path d="M44 54 L54 52 L58 60 L54 68 L46 70 L40 64 L38 56 Z"/>
    <path d="M66 44 L74 42 L80 48 L78 56 L72 58 L66 54 L64 48 Z"/>
    <path d="M50 70 L58 68 L62 74 L58 80 L50 80 L46 74 Z"/>
  </g>

  <!-- Network nodes on surface -->
  <g fill="rgba(192,132,252,0.7)">
    <circle cx="52" cy="36" r="1.5"/>
    <circle cx="68" cy="42" r="1.2"/>
    <circle cx="46" cy="54" r="1.4"/>
    <circle cx="72" cy="50" r="1.2"/>
    <circle cx="58" cy="66" r="1.3"/>
    <circle cx="78" cy="60" r="1.1"/>
    <circle cx="40" cy="64" r="1.2"/>
    <circle cx="62" cy="78" r="1.3"/>
  </g>

  <!-- Network connection lines on surface -->
  <g clip-path="url(#sphere)" stroke="rgba(192,132,252,0.22)" stroke-width="0.5" fill="none">
    <line x1="52" y1="36" x2="68" y2="42"/>
    <line x1="68" y1="42" x2="72" y2="50"/>
    <line x1="46" y1="54" x2="58" y2="66"/>
    <line x1="58" y1="66" x2="62" y2="78"/>
    <line x1="72" y1="50" x2="78" y2="60"/>
    <line x1="52" y1="36" x2="46" y2="54"/>
    <line x1="40" y1="64" x2="46" y2="54"/>
    <line x1="40" y1="64" x2="58" y2="66"/>
  </g>

  <!-- Orbital ring 1 — tilted ellipse, behind globe -->
  <ellipse cx="60" cy="62" rx="56" ry="14"
    stroke="rgba(255,255,255,0.18)" stroke-width="0.9" fill="none"
    transform="rotate(-18 60 62)"/>

  <!-- Orbital ring 2 — tighter ring, slightly different angle -->
  <ellipse cx="60" cy="58" rx="52" ry="10"
    stroke="rgba(192,132,252,0.25)" stroke-width="0.7" fill="none"
    transform="rotate(-12 60 58)"/>

  <!-- Orbital nodes on ring 1 -->
  <g fill="rgba(255,255,255,0.55)">
    <circle cx="17" cy="63" r="1.8" transform="rotate(-18 60 62)"/>
    <circle cx="103" cy="61" r="1.4" transform="rotate(-18 60 62)"/>
    <circle cx="60" cy="75" r="1.2" transform="rotate(-18 60 62)"/>
  </g>

  <!-- Small scatter nodes around globe -->
  <g fill="rgba(56,189,248,0.5)">
    <circle cx="108" cy="38" r="1.3"/>
    <circle cx="14"  cy="52" r="1.1"/>
    <circle cx="20"  cy="85" r="1.0"/>
    <circle cx="100" cy="82" r="1.2"/>
    <circle cx="55"  cy="8"  r="0.9"/>
    <circle cx="72"  cy="108" r="1.0"/>
  </g>

  <!-- Subtle outer ring -->
  <circle cx="60" cy="60" r="42" stroke="rgba(255,255,255,0.06)" stroke-width="0.4" fill="none"/>
</svg>
